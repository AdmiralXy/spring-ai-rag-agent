services:
  postgres:
    image: pgvector/pgvector:pg17-trixie
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ai
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: aipass
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data

volumes:
  pgvector-data:
